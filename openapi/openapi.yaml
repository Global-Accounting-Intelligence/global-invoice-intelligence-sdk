openapi: 3.0.3
info:
  title: Global Invoice Intelligence API
  version: 0.1.0
  description: |
    Global Invoice Intelligence API.

    ## Versioning and deprecation (`/v1` frozen)

    Business endpoints are served under the `/v1` base path. The `/v1` contract
    is **frozen**: no breaking change may be introduced to `/v1`. A breaking
    change — removing or renaming a field, changing a type, tightening
    validation, or altering documented semantics — requires a new major version
    served under `/v2`. Only backward-compatible additions (new optional fields,
    new endpoints, new optional headers) may be made within `/v1`.

    ## Authentication

    All tenant-scoped business endpoints require an API key supplied as an HTTP
    Bearer token (`Authorization: Bearer <api-key>`) together with the
    `X-Tenant-ID` header identifying the tenant the request is scoped to. The
    `/health` endpoint is public and unauthenticated.

    ## Correlation, idempotency, and rate limiting

    Clients may send `X-Request-ID` for end-to-end correlation; the same value is
    echoed on the response. Mutating endpoints accept an `Idempotency-Key` header
    so retries can be made safely. Authenticated responses carry the
    `X-RateLimit-*` headers, and requests that exceed the quota receive `429`.

    Request and response bodies declare the `application/json` media type.
    Canonical component schemas are registered under `components.schemas` and
    bound to request/response bodies only where a clear existing schema applies;
    bodies whose shape is not yet defined remain generic objects pending later,
    separately gated steps.

# Default security: HTTP Bearer (API key) applies to every operation; the
# public /health operation overrides this with an empty requirement.
security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      description: Public, unauthenticated health probe.
      security: []
      responses:
        '200':
          description: OK
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object

  /v1/invoices/normalize:
    post:
      summary: Normalize invoice
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invoice'
      responses:
        '200':
          description: Normalized invoice
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/invoices/match:
    post:
      summary: Match invoice lines to materials
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invoice'
      responses:
        '200':
          # Left generic intentionally: MatchResult describes a single
          # invoice-line result, but this endpoint matches a whole (multi-line)
          # invoice. Binding to the singular MatchResult would assert a
          # response shape (single vs. collection, bare array vs. envelope)
          # that is not yet defined. Deferred to a later, separately gated step.
          description: Match result
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/feedback/correction:
    post:
      summary: Submit correction feedback
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Correction'
      responses:
        '200':
          # Left generic intentionally: the Feedback schema models a recorded
          # accept/reject/correct action, which is not clearly the acknowledgement
          # returned when a correction is submitted. Binding it here would imply
          # response semantics not yet defined. Deferred to a later step.
          description: Feedback accepted
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/invoices/{id}/result:
    get:
      summary: Get invoice result
      description: >-
        Retrieve the result for a previously submitted invoice, scoped to the
        authenticated tenant. The response body declares the `application/json`
        media type but is not yet bound to a canonical component schema.
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the invoice whose result is requested.
          schema:
            type: string
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
      responses:
        '200':
          # Left generic intentionally: the result for an invoice spans multiple
          # lines, whereas MatchResult is a single-line shape. The collection/
          # envelope shape is not yet defined, so no binding is forced here.
          description: Invoice result
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/materials/{id}/score:
    get:
      summary: Get material score
      description: >-
        Retrieve the score for a material, scoped to the authenticated tenant.
        The response body is bound to the `MaterialScore` component schema.
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the material whose score is requested.
          schema:
            type: string
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
      responses:
        '200':
          description: Material score
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialScore'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/connectors/erpnext/push:
    post:
      summary: Push to ERPNext (draft only)
      description: >-
        Create or prepare an ERPNext **draft only**, scoped to the authenticated
        tenant. This endpoint does **not** auto-post: it only creates or prepares
        a draft in ERPNext and never submits or posts it. Request and response
        bodies declare the `application/json` media type but are not yet bound to
        canonical component schemas.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        # Left generic intentionally: the push payload is not a single MatchResult
        # (an invoice spans many lines) and no draft-push contract is defined yet.
        # Kept generic to avoid implying behavior. Draft-only; never auto-posts.
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          # Left generic intentionally: no existing schema describes the
          # draft-creation acknowledgement. Draft-only; no auto-post.
          description: ERPNext draft created or prepared
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
        '429':
          $ref: '#/components/responses/RateLimited'

components:
  schemas:
    # A3 component schema binding. Each component references the existing,
    # active SDK JSON Schema file unchanged (external $ref). No schema content
    # is defined or altered here; the referenced files remain the source of
    # truth. DD-3 hardening, the six missing public I/O schemas, the retired
    # legacy schema pack, and any private Core/intelligence internals are
    # explicitly out of scope for this step.
    Invoice:
      $ref: '../schemas/invoice.schema.json'
    InvoiceLine:
      $ref: '../schemas/invoice_line.schema.json'
    Supplier:
      $ref: '../schemas/supplier.schema.json'
    Material:
      $ref: '../schemas/material.schema.json'
    MatchResult:
      $ref: '../schemas/match_result.schema.json'
    MaterialScore:
      $ref: '../schemas/material_score.schema.json'
    Correction:
      $ref: '../schemas/correction.schema.json'
    Feedback:
      $ref: '../schemas/feedback.schema.json'
    Error:
      $ref: '../schemas/error.schema.json'
    WebhookEvent:
      $ref: '../schemas/webhook_event.schema.json'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        API key supplied as an HTTP Bearer token
        (`Authorization: Bearer <api-key>`).

  parameters:
    TenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: Identifier of the tenant the request is scoped to.
      schema:
        type: string

    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: >-
        Client-generated key that lets a mutating request be retried safely
        without being processed twice.
      schema:
        type: string

    RequestIdHeader:
      name: X-Request-ID
      in: header
      required: false
      description: >-
        Client-supplied correlation identifier; echoed back on the response.
      schema:
        type: string

  headers:
    X-Request-ID:
      description: Correlation identifier for this request/response pair.
      schema:
        type: string
    X-RateLimit-Limit:
      description: Maximum number of requests permitted in the current window.
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Requests remaining in the current window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix epoch seconds at which the current window resets.
      schema:
        type: integer

  responses:
    RateLimited:
      description: Rate limit exceeded.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            type: object
